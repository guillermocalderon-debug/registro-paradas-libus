<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Paradas - Libus</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-container { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .header { text-align: center; border-bottom: 2px solid #e6005a; padding-bottom: 15px; margin-bottom: 20px; }
        .header img { max-width: 140px; margin-bottom: 10px; }
        .header h2 { margin: 0; color: #333; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        
        .doc-control { display: flex; justify-content: center; gap: 15px; margin-top: 12px; font-size: 11px; color: #666; background-color: #f9f9f9; padding: 6px; border-radius: 4px; border: 1px solid #e0e0e0; }
        .doc-control strong { color: #333; }

        /* Estilo para las pestañas (Tabs) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; background-color: #e2e8f0; color: #64748b; }
        .tab-btn.active-start { background-color: #dc3545; color: white; box-shadow: 0 4px 10px rgba(220,53,69,0.3); }
        .tab-btn.active-end { background-color: #28a745; color: white; box-shadow: 0 4px 10px rgba(40,167,69,0.3); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #555; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; background-color: #fdfdfd; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #e6005a; outline: none; box-shadow: 0 0 5px rgba(230, 0, 90, 0.2); }
        
        .btn-submit { width: 100%; color: white; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-submit.btn-iniciar { background-color: #dc3545; }
        .btn-submit.btn-finalizar { background-color: #28a745; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }

        .success-msg { display: none; text-align: center; color: #28a745; background: #e8f5e9; border: 1px solid #c3e6cb; padding: 15px; border-radius: 6px; margin-top: 20px; font-weight: bold; }
        
        #loader { display: none; text-align: center; margin-top: 10px; font-size: 14px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header">
            <img src="libus_positivo_CMYK.jpg" alt="Libus" onerror="this.src='https://latam.libus.com/imagenes/logo_libus.png'">
            <h2>Reporte de Paradas</h2>
            <div class="doc-control">
                <span><strong>Cód:</strong> LCRg-PAR</span>
                <span><strong>Rev:</strong> 01</span>
                <span><strong>Fecha Rev:</strong> 02/07/2026</span>
            </div>
        </div>

        <div class="tabs">
            <button type="button" id="tabIniciar" class="tab-btn active-start" onclick="setMode('INICIAR')">🔴 DETENER MÁQ.</button>
            <button type="button" id="tabFinalizar" class="tab-btn" onclick="setMode('FINALIZAR')">🟢 ARRANCAR MÁQ.</button>
        </div>

        <form id="paradaForm">
            
            <div class="form-group" id="divFecha">
                <label>Fecha del Evento</label>
                <input type="date" id="fecha" required>
            </div>

            <div class="form-group">
                <label>Máquina Inyectora</label>
                <select id="maquina" required>
                    <option value="" disabled selected>Seleccione la máquina...</option>
                    <option value="Inyectora 1">Inyectora 1</option>
                    <option value="Inyectora 2">Inyectora 2</option>
                    <option value="Inyectora 3">Inyectora 3</option>
                    <option value="Inyectora 4">Inyectora 4</option>
                    <option value="Inyectora 5">Inyectora 5</option>
                    <option value="Inyectora 6">Inyectora 6</option>
                    <option value="Inyectora 7">Inyectora 7</option>
                </select>
            </div>

            <div class="form-group" id="divMotivo">
                <label>Motivo de la Parada</label>
                <select id="motivo">
                    <option value="" disabled selected>Seleccione el motivo...</option>
                    <option value="Cambio de Molde">Cambio de Molde</option>
                    <option value="Cambio de Master">Cambio de Master</option>
                    <option value="Falta de MP">Falta de Materia Prima</option>
                    <option value="Falta de Personal">Falta de Personal</option>
                    <option value="Problemas de Calidad">Problemas de Calidad</option>
                    <option value="Prob. Maq o Perif">Prob. Máquina o Periférico</option>
                    <option value="Prob. en el Molde">Problemas en el Molde</option>
                    <option value="Mantenimiento Correctivo">Mantenimiento Correctivo</option>
                    <option value="Mant. Preventivo / Lubricación">Mant. Preventivo / Lubricación</option>
                    <option value="Parada Programada">Parada Programada</option>
                </select>
            </div>

            <div class="form-group">
                <label id="lblHora">Hora de Detención (Inicio)</label>
                <input type="time" id="hora" required>
            </div>

            <div class="form-group">
                <label>Observaciones (Opcional)</label>
                <textarea id="obs" rows="2" placeholder="Detalles sobre el evento..."></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit btn-iniciar">Confirmar Detención</button>
            <div id="loader">Conectando con la base de datos... ⏳</div>
        </form>

        <div id="successMsg" class="success-msg">
            <span id="msgText">✅ ¡Evento registrado exitosamente!</span><br><br>
            <button onclick="resetForm()" style="background:#343a40; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Volver</button>
        </div>
    </div>

    <script>
        document.getElementById('fecha').valueAsDate = new Date();
        let modoActual = 'INICIAR';

        function setMode(modo) {
            modoActual = modo;
            const tabIniciar = document.getElementById('tabIniciar');
            const tabFinalizar = document.getElementById('tabFinalizar');
            const divMotivo = document.getElementById('divMotivo');
            const motivoInput = document.getElementById('motivo');
            const lblHora = document.getElementById('lblHora');
            const btnSubmit = document.getElementById('btnSubmit');

            if (modo === 'INICIAR') {
                tabIniciar.className = 'tab-btn active-start';
                tabFinalizar.className = 'tab-btn';
                divMotivo.style.display = 'block';
                motivoInput.required = true;
                lblHora.innerText = 'Hora de Detención (Inicio Parada)';
                btnSubmit.className = 'btn-submit btn-iniciar';
                btnSubmit.innerText = 'Confirmar Detención';
            } else {
                tabIniciar.className = 'tab-btn';
                tabFinalizar.className = 'tab-btn active-end';
                divMotivo.style.display = 'none';
                motivoInput.required = false;
                motivoInput.value = "";
                lblHora.innerText = 'Hora de Arranque (Fin Parada)';
                btnSubmit.className = 'btn-submit btn-finalizar';
                btnSubmit.innerText = 'Confirmar Arranque';
            }
        }

        document.getElementById('paradaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const loader = document.getElementById('loader');
            btn.disabled = true;
            loader.style.display = 'block';

            // !!!!!!!! ATENCIÓN: PEGA AQUÍ TU NUEVO LINK DE GOOGLE APPS SCRIPT !!!!!!!!
            const APPS_SCRIPT_URL = "https://script.google.com/macros/library/d/1w2KqDVffL7sGkGW0k4dJfO89ktfl786U8Q-gRIs5-DVvEigmpsLHw_Gb/4";

            // Armamos los datos en formato de enlace (GET) antibloqueos corporativos
            const parametros = new URLSearchParams({
                accion: modoActual,
                fecha: document.getElementById('fecha').value,
                maquina: document.getElementById('maquina').value,
                motivo: document.getElementById('motivo').value || "No aplica",
                hora: document.getElementById('hora').value,
                obs: document.getElementById('obs').value || "Sin observaciones"
            });

            const urlFinal = APPS_SCRIPT_URL + "?" + parametros.toString();

            // Petición limpia (GET) que salta la seguridad y permite leer la respuesta
            fetch(urlFinal)
            .then(response => response.json())
            .then(result => {
                loader.style.display = 'none';
                btn.disabled = false;
                
                if(result.status === 'success') {
                    document.getElementById('paradaForm').style.display = 'none';
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('msgText').innerText = result.message;
                } else {
                    alert(result.message); // Esto avisa si hay error (ej: Máquina ya parada)
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Hubo un error de conexión. Verifica tu internet.");
                loader.style.display = 'none';
                btn.disabled = false;
            });
        });

        function resetForm() {
            document.getElementById('paradaForm').reset();
            document.getElementById('fecha').valueAsDate = new Date();
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('paradaForm').style.display = 'block';
            setMode('INICIAR');
        }
    </script>
</body>
</html>
